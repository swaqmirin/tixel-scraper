name: Tixel Scraper

on:
  schedule:
    - cron: '*/5 * * * *'   # fallback only — cron-job.org is the primary trigger
  repository_dispatch:
    types: [scrape]          # triggered by cron-job.org every 4 minutes
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Send a test Telegram message after scraping (confirms everything works)'
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python tixel_scraper.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
