name: Weekly Report

on:
  schedule:
    - cron: '0 1 * * 0'   # 9:00am AWST (UTC+8) every Sunday = 01:00 UTC
  workflow_dispatch:       # also triggerable manually for testing

permissions:
  contents: write          # needed to push the heartbeat commit

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Send Telegram weekly check-in
        run: |
          NOW=$(TZ="Australia/Perth" date "+%A %-d %B %Y")
          MESSAGE="Weekly check-in — ${NOW}

Tixel scraper is running. Monitoring 4 Olivia Dean events (Melbourne + Sydney).

No ticket alerts sent this week. You'll hear from me the moment something goes live."
          curl -s "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Heartbeat commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TZ="Australia/Perth" date > heartbeat.txt
          git add heartbeat.txt
          git commit -m "chore: weekly heartbeat [skip ci]"
          git push
