name: Weekly Report

on:
  repository_dispatch:
    types: [weekly_report] # triggered by cron-job.org at 9am AWST every Sunday
  workflow_dispatch:       # manual trigger / emergency backup

permissions:
  contents: write          # needed to push the heartbeat commit

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Telegram weekly check-in
        run: |
          NOW=$(TZ="Australia/Perth" date "+%A %-d %B %Y")
          SINCE=$(date -u -d '7 days ago' '+%Y-%m-%dT00:00:00Z')
          BREAKDOWN=$(gh run list \
            --workflow scrape.yml \
            --status success \
            --limit 2000 \
            --json createdAt \
            --jq "
              [.[] | select(.createdAt >= \"${SINCE}\")] |
              group_by(.createdAt[0:10]) |
              map(\"\(.[0].createdAt[0:10]): \(length) runs\") |
              reverse | .[]
            " 2>/dev/null || echo "unavailable")
          COUNT=$(echo "${BREAKDOWN}" | grep -c "runs" || echo "?")
          MESSAGE="Weekly check-in — ${NOW}"$'\n\n'"Scraper runs in the past 7 days (UTC dates):"$'\n'"${BREAKDOWN}"$'\n\n'"Monitoring 4 Olivia Dean events (Melbourne + Sydney)."$'\n\n'"No ticket alerts this week. You will hear from me the moment something goes live."
          curl -s "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Heartbeat commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TZ="Australia/Perth" date > heartbeat.txt
          git add heartbeat.txt
          git commit -m "chore: weekly heartbeat [skip ci]"
          git push
