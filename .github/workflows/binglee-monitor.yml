name: Bing Lee Stock Monitor

# Triggered by cron-job.org via repository_dispatch.
# Schedule: every 15 min 6am–6pm AWST, once at midnight AWST.
# Expires: 6 June 2026 (no longer needed after departure).

on:
  repository_dispatch:
    types: [binglee_check]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Check Bing Lee stock
        run: python binglee_monitor.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
